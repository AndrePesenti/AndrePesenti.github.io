theme = "blowfish"
baseURL = "https://andrepesenti.github.io/"
defaultContentLanguage = "it"
disableLanguages = ["en", "de", "fr", "es", "ja", "pt-br", "pt-pt", "zh-cn"]

enableRobotsTXT = true
summaryLength = 30
hasCJKLanguage = false

buildDrafts = false
buildFuture = false

enableEmoji = true

[pagination]
  pagerSize = 10

[imaging]
  anchor = 'Center'

[taxonomies]
  tag = "tags"
  category = "categories"

[sitemap]
  changefreq = 'always'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ["HTML", "RSS", "JSON"]
